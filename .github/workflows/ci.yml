name: Required CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions: {}

defaults:
  run:
    shell: /bin/bash -p -e -o pipefail {0}

concurrency:
  group: required-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  required:
    name: Required CI / docs-policy-workflows
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Enforce solo contribution boundary
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login != 'chasebryan' }}
        run: |
          echo "Solo mode does not accept third-party pull requests until D-018 selects contribution terms." >&2
          exit 1

      - name: Validate solo-bootstrap repository policy
        run: /usr/bin/env -i HOME="$HOME" LANG=C LC_ALL=C PATH="$PATH" PYTHONHASHSEED=0 TZ=UTC python3 -S -P -B -X utf8 tools/validate_foundation.py

      - name: Run foundation validator unit tests
        run: pycache="$(/usr/bin/mktemp -d -- "$RUNNER_TEMP/orange-python-cache.XXXXXXXX")"; pycache="$(cd -- "$pycache" && pwd -P)"; trap '/usr/bin/rm -rf -- "$pycache"' EXIT; /usr/bin/env -i HOME="$HOME" LANG=C LC_ALL=C PATH="$PATH" PYTHONHASHSEED=0 PYTHONPYCACHEPREFIX="$pycache" TZ=UTC python3 -S -P -B -X utf8 -c 'import sys, unittest; sys.path.insert(0, "."); unittest.main(module=None)' discover -s tools/tests -p 'test_*.py'

      - name: Install selected Rust components
        run: /usr/bin/env -i HOME="$HOME" LANG=C LC_ALL=C PATH="$PATH" TZ=UTC rustup toolchain install 1.96.1 --profile minimal --component clippy,rustfmt --no-self-update

      - name: Validate Rust compiler
        run: /usr/bin/env -u BASH_ENV -u ENV -u GNUMAKEFLAGS -u MAKEFLAGS -u MAKEFILES -u MAKEOVERRIDES -u MFLAGS /usr/bin/make --no-builtin-rules --no-builtin-variables check-compiler

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            **/*.md
            .github/**/*.md

      - name: Install actionlint
        run: ./scripts/ci/install-actionlint "$RUNNER_TEMP/actionlint"

      - name: Validate GitHub Actions workflows
        run: |
          "$RUNNER_TEMP/actionlint/actionlint" -color

      - name: Audit GitHub Actions security
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: false
          online-audits: false
          persona: pedantic
          version: "1.26.1"
