name: OpenSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "41 5 * * 6"

permissions: {}

concurrency:
  group: openssf-scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: OpenSSF Scorecard / analysis
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # Required to upload SARIF to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        env:
          INPUT_RESULTS_FILE: results.sarif
          INPUT_RESULTS_FORMAT: sarif
          INPUT_REPO_TOKEN: ${{ github.token }}
          INPUT_PUBLISH_RESULTS: "false"
          INPUT_FILE_MODE: archive
        run: |
          docker run --rm \
            --read-only \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --pids-limit=256 \
            --user "$(id -u):$(id -g)" \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=256m \
            --env HOME=/tmp \
            --env GITHUB_ACTIONS \
            --env GITHUB_API_URL \
            --env GITHUB_EVENT_NAME \
            --env GITHUB_GRAPHQL_URL \
            --env GITHUB_REF \
            --env GITHUB_REPOSITORY \
            --env GITHUB_SERVER_URL \
            --env GITHUB_SHA \
            --env GITHUB_WORKSPACE=/github/workspace \
            --env GITHUB_EVENT_PATH=/github/workflow/event.json \
            --env INPUT_FILE_MODE \
            --env INPUT_PUBLISH_RESULTS \
            --env INPUT_REPO_TOKEN \
            --env INPUT_RESULTS_FILE \
            --env INPUT_RESULTS_FORMAT \
            --volume "${GITHUB_EVENT_PATH}:/github/workflow/event.json:ro" \
            --volume "${GITHUB_WORKSPACE}:/github/workspace" \
            --workdir /github/workspace \
            ghcr.io/ossf/scorecard-action@sha256:2dd6a6d60100f78ef24e14a47941d0087a524b4d3642041558239b1c6097c941 # v2.4.3

      - name: Preserve SARIF result
        if: ${{ always() && hashFiles('results.sarif') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: openssf-scorecard-sarif
          path: results.sarif
          retention-days: 14

      - name: Upload result to code scanning
        if: ${{ always() && hashFiles('results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
